<div class="flex items-center p-4 gap-2" [ngClass]="isHeaderFixed ? 'fixed':'nofixed'" (scroll)="onScroll()">
    <div class="w-16">
        <button pButton type="button" icon="pi pi-bars" [text]="true" (click)="isMenuOpen = !isMenuOpen"></button>
        <div class="game-menu" *ngIf="isMenuOpen && isMenuShown">
            <div class="flex flex-col gap-2 mx-4 py-3">
                <div class="cursor-pointer" (click)="toggleSound()">
                    <div *ngIf="isSoundOn; else isSoundOff" class="flex gap-2">
                        <i class="pi pi-volume-up text-blue-600"></i> Sound On
                    </div>
                    <ng-template #isSoundOff>
                        <div class="flex gap-2">
                            <i class="pi pi-volume-off text-blue-600"></i> Sound Off
                        </div>
                    </ng-template>
                </div>
                <div class="cursor-pointer" (click)="toggleFlipEffect()">
                    <div *ngIf="isFlipEffect; else isNotFlipEffect" class="flex gap-2">
                        <i class="pi pi-eye-slash text-blue-600"></i> Visibility Off
                    </div>
                    <ng-template #isNotFlipEffect>
                        <div class="flex gap-2">
                            <i class="pi pi-eye text-blue-600"></i> Visibility On
                        </div>
                    </ng-template>
                </div>

                <div class="cursor-pointer" (click)="toggleColumns()">
                    <div *ngIf="isTwoColumns; else isNotTwoColumns" class="flex gap-2">
                        <i class="pi pi-table text-blue-600"></i> 2 columns
                    </div>
                    <ng-template #isNotTwoColumns>
                        <div class="flex gap-2">
                            <i class="pi pi-th-large text-blue-600"></i> All mixed
                        </div>
                    </ng-template>
                </div>
            </div>
        </div>
    </div>
    <div class="flex gap-2" *ngIf="isMenuShown">
        <i class="pi" [ngClass]="isSoundOn ? 'pi-volume-up' : 'pi-volume-off'" pTooltip="Sound"></i>
        <i class="pi" [ngClass]="isFlipEffect ? 'pi-eye-slash' : 'pi-eye'" pTooltip="Visibility"></i>
        <i class="pi pi-table" pTooltip="2 columns"></i>
    </div>
    <p-progressBar [value]="progress"></p-progressBar>
    <div>{{ timeLeft }}</div>
    <div>
        <p-select [options]="languages" [(ngModel)]="currentLanguage" [style]="{ width: '120px' }" (onChange)="selectLanguage($event)">
            <ng-template pTemplate="selectedItem">
                <span class="fi fi-{{currentLanguage}} leading-8 w-16 rounded-lg"></span>
            </ng-template>
            <ng-template let-lang pTemplate="item">
                <span class="fi fi-{{lang}} leading-8 w-16 rounded-lg"></span>
            </ng-template>
        </p-select>
    </div>
</div>

<!-- 2 columns in small screens -->
<div *ngIf="isTwoColumns; else isLargeScreen" class="flex flex-wrap justify-center">
    <app-card class="justify-center basis-6/12 sm:flex" *ngFor="let card of cards" [card]="card" [isFlipEffect]="isFlipEffect" (selectCard)="selectCard($event)"></app-card>
</div>

<!-- More columns in large screens -->
<ng-template #isLargeScreen>
    <div class="flex flex-wrap justify-center">
        <app-card *ngFor="let card of cards" [card]="card" [isFlipEffect]="isFlipEffect" (selectCard)="selectCard($event)"></app-card>
    </div>
</ng-template>

<p-toolbar styleClass="game-toolbar absolute bottom-0 left-0 w-full">
    <ng-template pTemplate="start">
        <span class="font-semibold">Games</span>
        <i class="pi pi-flag ml-3" pTooltip="Languages"></i>
    </ng-template>
    <ng-template pTemplate="end">
        <span class="mr-3">Soon</span>
        <i class="pi pi-users mr-3" pTooltip="Childs"></i>
        <i class="pi pi-calculator mr-3" pTooltip="Maths"></i>
        <i class="pi pi-user-plus mr-3" pTooltip="Synonyms"></i>
        <i class="pi pi-check-double" pTooltip="Antonyms"></i>
    </ng-template>
</p-toolbar>

<p-dialog
    header="Game finished"
    [(visible)]="isGameDialogVisible"
    [modal]="true"
    [closable]="false"
    [draggable]="false"
    [resizable]="false"
    [style]="{ width: '24rem' }">
    <div class="flex flex-col gap-4">
        <span>{{ gameDialogMessage }}</span>
        <div class="flex justify-end">
            <button pButton type="button" label="New game" (click)="closeGameDialog(true)"></button>
        </div>
    </div>
</p-dialog>
