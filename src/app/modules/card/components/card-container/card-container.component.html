<section class="board-shell">
    <header class="board-header" [class.board-header-fixed]="isHeaderFixed">
        <div class="board-header__top">
            <div class="board-header__brand">
                <span class="board-header__eyebrow">Language Match</span>
                <button
                    pButton
                    type="button"
                    icon="pi pi-info-circle"
                    class="p-button-text p-button-sm board-header__info"
                    pTooltip="Empareja cada palabra con su traduccion"
                    tooltipPosition="bottom"
                    aria-label="Game instructions">
                </button>
            </div>

            <div class="board-header__mobile-summary">
                <div class="board-status__timer board-status__timer--compact">
                    <span class="timer-label">Time</span>
                    <strong>{{ timeLeft }}s</strong>
                </div>
            </div>

            <div class="board-header__actions">
                <div class="board-header__account">
                    <span class="board-header__username" *ngIf="username">{{ username }}</span>
                    <button
                        pButton
                        type="button"
                        label="Logout"
                        icon="pi pi-sign-out"
                        class="p-button-outlined p-button-sm"
                        (click)="logoutRequested.emit()">
                    </button>
                </div>

                <button
                    pButton
                    type="button"
                    icon="pi pi-bars"
                    [label]="isMenuOpen ? 'Close' : 'Menu'"
                    class="p-button-text board-header__menu-button"
                    (click)="isMenuOpen = !isMenuOpen"
                    aria-label="Open game options">
                </button>

                <div class="board-menu-backdrop" *ngIf="isMenuOpen" (click)="closeMenu()"></div>

                <div class="board-menu" *ngIf="isMenuOpen && isMenuShown">
                    <div class="board-menu__section board-menu__section--mobile">
                        <span class="board-menu__section-title">Player</span>
                        <div class="board-menu__account">
                            <span class="board-header__username" *ngIf="username">{{ username }}</span>
                            <button
                                pButton
                                type="button"
                                label="Logout"
                                icon="pi pi-sign-out"
                                class="p-button-outlined p-button-sm"
                                (click)="isMenuOpen = false; logoutRequested.emit()">
                            </button>
                        </div>
                    </div>

                    <div class="board-menu__section">
                        <span class="board-menu__section-title">Language</span>
                        <label class="language-picker language-picker--menu">
                            <p-select
                                [options]="languages"
                                [(ngModel)]="currentLanguage"
                                [style]="{ width: '100%' }"
                                appendTo="body"
                                (onChange)="selectLanguage($event)">
                                <ng-template pTemplate="selectedItem">
                                    <span class="language-option">
                                        <span class="fi fi-{{currentLanguage}}"></span>
                                        <span>{{ currentLanguage | uppercase }}</span>
                                    </span>
                                </ng-template>
                                <ng-template let-lang pTemplate="item">
                                    <span class="language-option">
                                        <span class="fi fi-{{lang}}"></span>
                                        <span>{{ lang | uppercase }}</span>
                                    </span>
                                </ng-template>
                            </p-select>
                        </label>
                    </div>

                    <button type="button" class="board-menu__item" (click)="toggleSound()">
                        <i class="pi" [ngClass]="isSoundOn ? 'pi-volume-up' : 'pi-volume-off'"></i>
                        <span>{{ isSoundOn ? 'Sound on' : 'Sound off' }}</span>
                    </button>

                    <button type="button" class="board-menu__item" (click)="toggleFlipEffect()">
                        <i class="pi" [ngClass]="isFlipEffect ? 'pi-eye-slash' : 'pi-eye'"></i>
                        <span>{{ isFlipEffect ? 'Hidden cards' : 'Visible cards' }}</span>
                    </button>

                    <button type="button" class="board-menu__item" (click)="toggleColumns()">
                        <i class="pi" [ngClass]="isTwoColumns ? 'pi-table' : 'pi-th-large'"></i>
                        <span>{{ isTwoColumns ? 'Two columns' : 'Mixed board' }}</span>
                    </button>
                </div>
            </div>
        </div>
        <div class="board-status board-status--header">
            <div class="board-status__progress board-status__progress--header">
                <div class="progress-copy">
                    <span>Progress</span>
                    <strong>{{ progress | number:'1.0-0' }}%</strong>
                </div>
                <p-progressBar [value]="progress"></p-progressBar>
            </div>
        </div>
        <div class="board-status__notice" *ngIf="cardsSourceReason">
            <i class="pi" [ngClass]="isUsingFallbackCards ? 'pi-info-circle' : 'pi-check-circle'"></i>
            <span>{{ cardsSourceReason }}</span>
        </div>
        <div class="board-header__language-mobile">
            <p-select
                [options]="languages"
                [(ngModel)]="currentLanguage"
                [style]="{ width: '100%' }"
                appendTo="body"
                (onChange)="selectLanguage($event)">
                <ng-template pTemplate="selectedItem">
                    <span class="language-option">
                        <span class="fi fi-{{currentLanguage}}"></span>
                        <span>{{ currentLanguage | uppercase }}</span>
                    </span>
                </ng-template>
                <ng-template let-lang pTemplate="item">
                    <span class="language-option">
                        <span class="fi fi-{{lang}}"></span>
                        <span>{{ lang | uppercase }}</span>
                    </span>
                </ng-template>
            </p-select>
        </div>
    </header>

    <div class="board-grid" [class.board-grid--columns]="isTwoColumns" [class.board-grid--loading]="isLoading">
        <ng-container *ngIf="!isLoading; else loadingState">
            <app-card
                *ngFor="let card of cards"
                [card]="card"
                [isFlipEffect]="isFlipEffect"
                (selectCard)="selectCard($event)">
            </app-card>
        </ng-container>
    </div>

    <ng-template #loadingState>
        <div class="board-loading">
            <i class="pi pi-spin pi-spinner"></i>
            <span>Loading cards...</span>
        </div>
    </ng-template>

    <p-toolbar styleClass="game-toolbar">
        <ng-template pTemplate="start">
            <span class="game-toolbar__title">More games</span>
        </ng-template>
        <ng-template pTemplate="end">
            <span class="game-toolbar__item"><i class="pi pi-flag"></i> Languages</span>
            <span class="game-toolbar__item"><i class="pi pi-users"></i> Kids</span>
            <span class="game-toolbar__item"><i class="pi pi-calculator"></i> Maths</span>
            <span class="game-toolbar__item"><i class="pi pi-user-plus"></i> Synonyms</span>
            <span class="game-toolbar__item"><i class="pi pi-check-double"></i> Antonyms</span>
        </ng-template>
    </p-toolbar>
</section>

<p-dialog
    header="Game finished"
    [(visible)]="isGameDialogVisible"
    [modal]="true"
    [closable]="false"
    [draggable]="false"
    [resizable]="false"
    [style]="{ width: '24rem' }">
    <div class="dialog-content">
        <span>{{ gameDialogMessage }}</span>
        <div class="dialog-content__actions">
            <button pButton type="button" label="New game" (click)="closeGameDialog(true)"></button>
        </div>
    </div>
</p-dialog>
