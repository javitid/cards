<button
    type="button"
    class="card"
    [class.card-back]="isFlipEffect && !card.match && !card.selected"
    [class.highlight-card]="card.selected"
    [class.matched-card]="card.match"
    [disabled]="card.match"
    (click)="selectCard.emit(card)">
    <span *ngIf="card.match" class="card-state">
        <i class="pi pi-check-circle"></i>
    </span>

    <span class="card-value">
        {{ isFlipEffect && !card.match && !card.selected ? '•••' : card.value }}
    </span>
</button>
