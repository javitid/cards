<div class="auth-stack">
  <p-card>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <h2>Register</h2>

      <p-floatlabel>
        <input pInputText id="register-email" formControlName="email" autocomplete="off" />
        <label for="register-email">Email</label>
      </p-floatlabel>
      <small class="error-text" *ngIf="form.controls.email.invalid && form.controls.email.touched">
        Please provide a valid email address
      </small>

      <p-floatlabel>
        <p-password
          inputId="register-password"
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          [inputStyleClass]="'w-full'"
          [style]="{ width: '100%' }">
        </p-password>
        <label for="register-password">Password</label>
      </p-floatlabel>
      <small class="error-text" *ngIf="form.controls.password.invalid && form.controls.password.touched">
        Please provide a valid password
      </small>

      <p-floatlabel>
        <p-password
          inputId="register-confirm-password"
          formControlName="confirmPassword"
          [feedback]="false"
          [toggleMask]="true"
          [inputStyleClass]="'w-full'"
          [style]="{ width: '100%' }">
        </p-password>
        <label for="register-confirm-password">Repeat password</label>
      </p-floatlabel>
      <small class="error-text" *ngIf="form.controls.confirmPassword.invalid && form.controls.confirmPassword.touched">
        Please repeat password
      </small>

      <div class="auth-actions">
        <button pButton type="submit" label="Register" [disabled]="!form.valid"></button>
        <a routerLink="/login" class="text-blue-800">Login</a>
      </div>
    </form>
  </p-card>
</div>
