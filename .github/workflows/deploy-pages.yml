name: Deploy To GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Inject Firebase config for production
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          if [ -z "$FIREBASE_API_KEY" ] || [ -z "$FIREBASE_AUTH_DOMAIN" ] || [ -z "$FIREBASE_PROJECT_ID" ] || [ -z "$FIREBASE_STORAGE_BUCKET" ] || [ -z "$FIREBASE_MESSAGING_SENDER_ID" ] || [ -z "$FIREBASE_APP_ID" ]; then
            echo "Error: Missing Firebase secrets. Configure FIREBASE_* secrets in GitHub before deploying."
            exit 1
          fi
          
          node -e "
          const fs = require('fs');
          const env = {
            production: true,
            appId: 'cards-397007',
            firebase: {
              apiKey: '$FIREBASE_API_KEY',
              authDomain: '$FIREBASE_AUTH_DOMAIN',
              projectId: '$FIREBASE_PROJECT_ID',
              storageBucket: '$FIREBASE_STORAGE_BUCKET',
              messagingSenderId: '$FIREBASE_MESSAGING_SENDER_ID',
              appId: '$FIREBASE_APP_ID',
              measurementId: '$FIREBASE_MEASUREMENT_ID'
            },
            openAICredentials: {
              apiKey: '',
              organization: ''
            }
          };
          fs.writeFileSync('src/environments/environment.prod.ts', 'export const environment = ' + JSON.stringify(env, null, 2) + ';');
          "
          
          echo "Firebase config injected from GitHub Secrets."

      - name: Build Angular app for Pages
        run: npm run build:pages

      - name: Prepare SPA fallback
        run: |
          cp dist/cards/index.html dist/cards/404.html
          touch dist/cards/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/cards

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4